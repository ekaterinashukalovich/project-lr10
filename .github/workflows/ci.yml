name: Mortgage Service CI

on:
  push:
    branches: [ main, integration/merge-all ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black

      - name: Lint with flake8
        run: |
          flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check with black
        run: black --check backend/ tests/

      - name: Test with pytest
        run: pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t mortgage-service .

      - name: Run container test
        run: |
          docker run -d --name test-container -p 8000:8000 mortgage-service
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
          docker rm test-container